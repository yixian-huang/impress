name: inkless

services:
  # PostgreSQL database service
  db:
    image: postgres:15-alpine
    container_name: inkless-db
    environment:
      POSTGRES_DB: inkless
      POSTGRES_USER: inkless
      POSTGRES_PASSWORD: inkless_dev_password
    ports:
      - "5432:5432"
    volumes:
      - inkless-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkless -d inkless"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inkless-network

  # Backend API service (Go/Gin/GORM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inkless-backend
    environment:
      PORT: 8088
      DB_DSN: "host=db user=inkless password=inkless_dev_password dbname=inkless port=5432 sslmode=disable TimeZone=Asia/Shanghai"
      JWT_SECRET: "dev_jwt_secret_change_in_production"
      JWT_REFRESH_SECRET: "dev_jwt_refresh_secret_change_in_production"
      ENV: "development"
    ports:
      - "8088:8088"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source for live reload during development (optional)
      - ./backend/cmd:/app/cmd
      - ./backend/internal:/app/internal
      - ./backend/pkg:/app/pkg
      - ./backend/go.mod:/app/go.mod
      - ./backend/go.sum:/app/go.sum
    networks:
      - inkless-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend SPA service (React/Vite)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    container_name: inkless-frontend
    environment:
      VITE_API_BASE_URL: "http://localhost:8088"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      # Mount source for hot module reload (app lives at /app/frontend in container)
      - ./frontend/src:/app/frontend/src
      - ./frontend/public:/app/frontend/public
      - ./frontend/index.html:/app/frontend/index.html
      - ./frontend/vite.config.ts:/app/frontend/vite.config.ts
      - ./frontend/tsconfig.app.json:/app/frontend/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/frontend/tsconfig.node.json
      - ./frontend/tailwind.config.ts:/app/frontend/tailwind.config.ts
      - ./frontend/postcss.config.ts:/app/frontend/postcss.config.ts
      - /app/frontend/node_modules
    networks:
      - inkless-network
    restart: unless-stopped
    command: pnpm dev --host 0.0.0.0

volumes:
  inkless-postgres-data:
    driver: local

networks:
  inkless-network:
    driver: bridge
