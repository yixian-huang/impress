basePath: /
definitions:
  blotting-consultancy_internal_model.JSONMap:
    additionalProperties: true
    type: object
  blotting-consultancy_internal_service.TranslationState:
    enum:
    - done
    - missing
    - stale
    type: string
    x-enum-varnames:
    - TranslationStateDone
    - TranslationStateMissing
    - TranslationStateStale
  blotting-consultancy_internal_service.ValidationError:
    properties:
      code:
        type: string
      message:
        type: string
      path:
        type: string
    type: object
  internal_handler_article.createUpdateInput:
    properties:
      allowComments:
        type: boolean
      author:
        type: string
      autoSummary:
        type: boolean
      categoryId:
        type: integer
      categoryIds:
        items:
          type: integer
        type: array
      coverImage:
        type: string
      enBody:
        type: string
      enMetaDescription:
        type: string
      enSeoTitle:
        type: string
      enTitle:
        type: string
      metadata:
        $ref: '#/definitions/blotting-consultancy_internal_model.JSONMap'
      ogImage:
        type: string
      pinned:
        type: boolean
      slug:
        type: string
      status:
        type: string
      tagIds:
        items:
          type: integer
        type: array
      visibility:
        type: string
      zhBody:
        type: string
      zhMetaDescription:
        type: string
      zhSeoTitle:
        type: string
      zhTitle:
        type: string
    type: object
  internal_handler_auth.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  internal_handler_auth.LoginResponse:
    properties:
      accessToken:
        type: string
      expiresIn:
        type: integer
      refreshToken:
        type: string
      role:
        type: string
    type: object
  internal_handler_auth.LogoutRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  internal_handler_auth.LogoutResponse:
    properties:
      ok:
        type: boolean
    type: object
  internal_handler_auth.MeResponse:
    properties:
      id:
        type: integer
      isSuperAdmin:
        type: boolean
      permissions:
        items:
          type: string
        type: array
      role:
        type: string
      username:
        type: string
    type: object
  internal_handler_auth.RefreshRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  internal_handler_auth.RefreshResponse:
    properties:
      accessToken:
        type: string
      expiresIn:
        type: integer
    type: object
  internal_handler_comment.createInput:
    properties:
      authorEmail:
        type: string
      authorName:
        type: string
      authorUrl:
        type: string
      captchaToken:
        type: string
      content:
        type: string
      contentId:
        type: integer
      contentType:
        type: string
      parentId:
        type: integer
    required:
    - authorName
    - content
    - contentId
    - contentType
    type: object
  internal_handler_content.GetDraftResponse:
    properties:
      config:
        $ref: '#/definitions/blotting-consultancy_internal_model.JSONMap'
      pageKey:
        type: string
      publishedVersion:
        type: integer
      updatedAt:
        type: string
      version:
        type: integer
    type: object
  internal_handler_content.GetVersionDetailResponse:
    properties:
      config:
        $ref: '#/definitions/blotting-consultancy_internal_model.JSONMap'
      createdBy:
        type: integer
      id:
        type: integer
      pageKey:
        type: string
      publishedAt:
        type: string
      version:
        type: integer
    type: object
  internal_handler_content.GetVersionsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_handler_content.VersionListItem'
        type: array
      total:
        type: integer
    type: object
  internal_handler_content.PublishRequest:
    properties:
      changeNote:
        type: string
      expectedDraftVersion:
        type: integer
    required:
    - expectedDraftVersion
    type: object
  internal_handler_content.PublishResponse:
    properties:
      pageKey:
        type: string
      publishedAt:
        type: string
      publishedVersion:
        type: integer
    type: object
  internal_handler_content.RollbackRequest:
    properties:
      changeNote:
        type: string
    type: object
  internal_handler_content.RollbackResponse:
    properties:
      pageKey:
        type: string
      publishedAt:
        type: string
      publishedVersion:
        type: integer
      sourceVersion:
        type: integer
    type: object
  internal_handler_content.UpdateDraftRequest:
    properties:
      changeNote:
        type: string
      config:
        $ref: '#/definitions/blotting-consultancy_internal_model.JSONMap'
    required:
    - config
    type: object
  internal_handler_content.UpdateDraftResponse:
    properties:
      pageKey:
        type: string
      updatedAt:
        type: string
      version:
        type: integer
    type: object
  internal_handler_content.ValidateRequest:
    properties:
      config:
        $ref: '#/definitions/blotting-consultancy_internal_model.JSONMap'
    required:
    - config
    type: object
  internal_handler_content.ValidateResponse:
    properties:
      errors:
        items:
          $ref: '#/definitions/blotting-consultancy_internal_service.ValidationError'
        type: array
      translationStatus:
        additionalProperties:
          $ref: '#/definitions/blotting-consultancy_internal_service.TranslationState'
        type: object
      valid:
        type: boolean
    type: object
  internal_handler_content.VersionListItem:
    properties:
      changeNote:
        type: string
      createdAt:
        type: string
      operator:
        type: string
      version:
        type: integer
    type: object
  internal_handler_user.CreateRequest:
    properties:
      password:
        minLength: 6
        type: string
      permissions:
        items:
          type: string
        type: array
      role:
        type: string
      username:
        type: string
    required:
    - password
    - role
    - username
    type: object
  internal_handler_user.UpdateRequest:
    properties:
      password:
        type: string
      permissions:
        items:
          type: string
        type: array
      role:
        type: string
      username:
        type: string
    type: object
  internal_handler_user.UserResponse:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      isSuperAdmin:
        type: boolean
      permissions:
        items:
          type: string
        type: array
      role:
        type: string
      updatedAt:
        type: string
      username:
        type: string
    type: object
host: localhost:8088
info:
  contact: {}
  description: Bilingual CMS backend API for Impress (印迹). Supports content management,
    articles, pages, themes, media, and more.
  title: Impress CMS API
  version: "1.0"
paths:
  /admin/analytics/summary:
    get:
      description: Returns page view statistics including today, last 7 days, last
        30 days, and unique visitors
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              pages:
                items:
                  type: object
                type: array
              totals:
                type: object
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get analytics summary
      tags:
      - Analytics (Admin)
  /admin/articles:
    get:
      description: Returns paginated articles including drafts for admin management
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Status filter (draft/published/scheduled)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  type: object
                type: array
              total:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all articles (admin)
      tags:
      - Articles (Admin)
    post:
      consumes:
      - application/json
      description: Create a new article (draft by default)
      parameters:
      - description: Article data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_article.createUpdateInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create article
      tags:
      - Articles (Admin)
  /admin/articles/{id}:
    delete:
      description: Permanently delete an article by ID
      parameters:
      - description: Article ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete article
      tags:
      - Articles (Admin)
    get:
      description: Returns a single article by its database ID
      parameters:
      - description: Article ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get article by ID (admin)
      tags:
      - Articles (Admin)
    put:
      consumes:
      - application/json
      description: Update an existing article by ID
      parameters:
      - description: Article ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated article data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_article.createUpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update article
      tags:
      - Articles (Admin)
  /admin/articles/{id}/export:
    get:
      description: Returns the article as a Markdown file with YAML front matter
      parameters:
      - description: Article ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - text/markdown
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Export article as Markdown
      tags:
      - Articles (Admin)
  /admin/audit-logs:
    get:
      description: Returns paginated audit events with optional filters
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Action filter
        in: query
        name: action
        type: string
      - description: Actor filter
        in: query
        name: actor
        type: string
      - description: From date (RFC3339)
        in: query
        name: from
        type: string
      - description: To date (RFC3339)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  type: object
                type: array
              page:
                type: integer
              pageSize:
                type: integer
              total:
                type: integer
            type: object
      security:
      - BearerAuth: []
      summary: List audit logs
      tags:
      - Audit Logs
  /admin/backups:
    get:
      description: Returns all backup records
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  type: object
                type: array
            type: object
      security:
      - BearerAuth: []
      summary: List backups
      tags:
      - Backup
  /admin/backups/export:
    post:
      description: Generate a full site export as a ZIP archive
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Export site
      tags:
      - Backup
  /admin/backups/export/{filename}:
    get:
      description: Download a site export ZIP file
      parameters:
      - description: Export filename
        in: path
        name: filename
        required: true
        type: string
      produces:
      - application/zip
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Download export
      tags:
      - Backup
  /admin/backups/import:
    post:
      consumes:
      - multipart/form-data
      description: Upload a ZIP archive and restore the full site
      parameters:
      - description: Import ZIP file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Import site
      tags:
      - Backup
  /admin/backups/import/validate:
    post:
      consumes:
      - multipart/form-data
      description: Upload a ZIP and validate its structure without importing
      parameters:
      - description: Import ZIP file to validate
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Validate import
      tags:
      - Backup
  /admin/backups/trigger:
    post:
      description: Manually trigger a database backup
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Trigger backup
      tags:
      - Backup
  /admin/categories:
    get:
      description: Returns all categories for admin management
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  type: object
                type: array
            type: object
      security:
      - BearerAuth: []
      summary: List all categories
      tags:
      - Categories (Admin)
    post:
      consumes:
      - application/json
      description: Create a new category
      parameters:
      - description: Category data
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create category
      tags:
      - Categories
  /admin/categories/{id}:
    delete:
      description: Delete a category by ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete category
      tags:
      - Categories
    get:
      description: Returns a single category by its database ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get category by ID
      tags:
      - Categories (Admin)
    put:
      consumes:
      - application/json
      description: Update an existing category by ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated category data
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update category
      tags:
      - Categories
  /admin/categories/tree:
    get:
      description: Returns categories organized in a parent-child tree structure
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  type: object
                type: array
            type: object
      security:
      - BearerAuth: []
      summary: List categories as tree
      tags:
      - Categories (Admin)
  /admin/comments:
    get:
      description: Returns paginated comments with optional status filtering
      parameters:
      - description: Status filter
        in: query
        name: status
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              comments:
                items:
                  type: object
                type: array
              total:
                type: integer
            type: object
      security:
      - BearerAuth: []
      summary: List all comments (admin)
      tags:
      - Comments (Admin)
  /admin/comments/{id}:
    delete:
      description: Delete a comment by ID
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete comment
      tags:
      - Comments (Admin)
  /admin/comments/{id}/pin:
    put:
      consumes:
      - application/json
      description: Set or unset the pinned flag on a comment
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Pin state
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Pin comment
      tags:
      - Comments (Admin)
  /admin/comments/{id}/status:
    patch:
      consumes:
      - application/json
      description: Approve, reject, or mark a comment as spam
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Status update
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update comment status
      tags:
      - Comments (Admin)
  /admin/content/{pageKey}/draft:
    get:
      description: Returns the draft config for a given page key
      parameters:
      - description: Page key (e.g. home, about)
        in: path
        name: pageKey
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler_content.GetDraftResponse'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get draft content
      tags:
      - Content (Admin)
    put:
      consumes:
      - application/json
      description: Updates the draft config for a page key with optimistic locking
        via If-Match header
      parameters:
      - description: Page key
        in: path
        name: pageKey
        required: true
        type: string
      - description: Expected draft version for optimistic locking
        in: header
        name: If-Match
        required: true
        type: integer
      - description: Draft content data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_content.UpdateDraftRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler_content.UpdateDraftResponse'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update draft content
      tags:
      - Content (Admin)
  /admin/content/{pageKey}/publish:
    post:
      consumes:
      - application/json
      description: Promotes the current draft to published state with optimistic locking
      parameters:
      - description: Page key
        in: path
        name: pageKey
        required: true
        type: string
      - description: Publish parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_content.PublishRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler_content.PublishResponse'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Publish content
      tags:
      - Content (Admin)
  /admin/content/{pageKey}/rollback/{version}:
    post:
      consumes:
      - application/json
      description: Rolls back published content to a previous version
      parameters:
      - description: Page key
        in: path
        name: pageKey
        required: true
        type: string
      - description: Source version to rollback to
        in: path
        name: version
        required: true
        type: integer
      - description: Rollback parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_content.RollbackRequest'
      produces:
      - application/json
      responses:
        "200":
