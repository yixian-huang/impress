# Inkless CMS canonical reverse proxy.
#
# Production DNS/TLS changes are external operations. Install this file after
# inkless.run resolves to the host and certificates are issued for both names.

upstream inkless_api {
    server 127.0.0.1:8088;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name inkless.run www.inkless.run;

    location ^~ /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        allow all;
    }

    location / {
        return 301 https://inkless.run$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.inkless.run;

    ssl_certificate /etc/letsencrypt/live/inkless.run/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inkless.run/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://inkless.run$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name inkless.run;

    ssl_certificate /etc/letsencrypt/live/inkless.run/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inkless.run/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 64m;

    access_log /var/log/nginx/inkless.access.log main;
    error_log /var/log/nginx/inkless.error.log warn;

    location = /favicon.ico {
        proxy_pass http://inkless_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~* ^/(assets|images|brand)/ {
        proxy_pass http://inkless_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ^~ /uploads/ {
        proxy_pass http://inkless_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        proxy_pass http://inkless_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
